{% extends "app_shell.html" %}
{% block page_content %}
<div class="grid gap-6 xl:grid-cols-[0.95fr_1.05fr]">
    <article class="glass-card p-6">
        <div class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
            <div>
                <p class="section-kicker">Employee Form</p>
                <h2 class="text-2xl font-semibold">Add, edit, or remove team members</h2>
            </div>
            <div id="employee-summary" class="chip-row"></div>
        </div>
        <div id="employee-alert" class="mt-5 hidden rounded-2xl border px-4 py-3 text-sm"></div>
        <form id="employee-form" class="mt-5 space-y-4">
            <input id="employee-id" name="id" type="hidden">
            <input id="employee-name" name="name" type="text" class="field" placeholder="Employee name" required>
            <input id="employee-role" name="role" type="text" class="field" placeholder="Role or department" required>
            <div class="flex flex-wrap gap-3">
                <button type="submit" class="action-btn bg-glow text-ink">Save Employee</button>
                <button id="employee-reset-button" type="button" class="action-btn border border-white/10 bg-white/5 text-white">Reset</button>
                <a href="{{ url_for('pages.attendance_page') }}" class="action-btn border border-glow/20 bg-glow/10 text-glow">Open Attendance</a>
            </div>
        </form>
    </article>

    <article class="glass-card p-6">
        <p class="section-kicker">Employee Records</p>
        <h2 class="text-2xl font-semibold">Current staff directory</h2>
        <div id="employee-record-list" class="mt-5 space-y-3"></div>
    </article>
</div>
{% endblock %}
