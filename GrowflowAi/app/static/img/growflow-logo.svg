<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="growflowLogoTitle growflowLogoDesc">
  <title id="growflowLogoTitle">GrowFlow AI logo</title>
  <desc id="growflowLogoDesc">A stylized green to cyan G icon with growth bars and an upward arrow, followed by the GrowFlow AI wordmark and tagline.</desc>
  <defs>
    <linearGradient id="brandGradient" x1="160" y1="40" x2="820" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d5ff2f"/>
      <stop offset="0.48" stop-color="#76ee42"/>
      <stop offset="1" stop-color="#00b7a5"/>
    </linearGradient>
    <linearGradient id="aiGradient" x1="570" y1="250" x2="760" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cfff2f"/>
      <stop offset="1" stop-color="#78ee45"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L16,8 L0,16 L5,8 Z" fill="url(#brandGradient)"/>
    </marker>
  </defs>

  <path d="M250 72 A132 132 0 1 0 298 334 H360" fill="none" stroke="url(#brandGradient)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="245" y="215" width="36" height="64" rx="4" fill="url(#brandGradient)"/>
  <rect x="295" y="175" width="36" height="104" rx="4" fill="url(#brandGradient)"/>
  <rect x="345" y="135" width="36" height="144" rx="4" fill="url(#brandGradient)"/>
  <path d="M230 275 C292 255 350 212 452 100" fill="none" stroke="url(#brandGradient)" stroke-width="24" stroke-linecap="round" marker-end="url(#arrowHead)"/>

  <text x="96" y="355" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="94" font-weight="700" letter-spacing="-2">
    GrowFlow
  </text>
  <text x="612" y="355" fill="url(#aiGradient)" font-family="Arial, Helvetica, sans-serif" font-size="94" font-weight="700" letter-spacing="-2">
    AI
  </text>

  <line x1="92" y1="388" x2="168" y2="388" stroke="#6bef61" stroke-width="4" stroke-linecap="round"/>
  <line x1="782" y1="388" x2="858" y2="388" stroke="#6bef61" stroke-width="4" stroke-linecap="round"/>
  <text x="186" y="394" fill="#f0f0f0" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="4">
    SMART BUSINESS, SMART GROWTH
  </text>
</svg>
